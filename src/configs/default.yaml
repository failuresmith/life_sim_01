seed: 42

world:
  width: 10
  height: 10
  food_count: 8
  food_respawn_per_step: 1
  observation_radius: 2

simulation:
  mode: training
  episodes: 60
  max_steps: 120
  output_dir: outputs

agent:
  policy: random
  start_energy: 20
  use_memory: false

population:
  initial_agents: 10
  min_reproduction_age: 8
  reproduction_energy_cost: 8

traits:
  reproduction_threshold: 18.0
  exploration_bias: 0.2
  food_seek_weight: 1.0
  mutation_std: 0.15

learning:
  alpha: 0.1
  gamma: 0.95
  epsilon: 0.2
  epsilon_decay: 0.985
  epsilon_min: 0.02

rewards:
  step_penalty: -1.0
  food_reward: 5.0
  death_penalty: -10.0
